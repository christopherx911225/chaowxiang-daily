<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>潮向 | 建材家居行业日报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #0c1929;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            padding: 40px 24px;
            text-align: center;
        }
        .brand {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #d4af37 0%, #f0d060 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 16px;
            color: rgba(226,232,240,0.6);
            letter-spacing: 4px;
            font-weight: 300;
            margin-bottom: 40px;
        }
        .report-list {
            list-style: none;
            text-align: left;
        }
        .report-item {
            background: #111d30;
            border-radius: 12px;
            padding: 18px 24px;
            margin-bottom: 12px;
            border: 1px solid rgba(212,175,55,0.08);
            transition: all 0.2s;
        }
        .report-item:hover {
            border-color: rgba(212,175,55,0.2);
            transform: translateY(-1px);
        }
        .report-item a {
            color: #e2e8f0;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .report-item a:hover {
            color: #d4af37;
        }
        .report-item .date {
            color: #d4af37;
            font-weight: 600;
        }
        .report-item .arrow {
            color: #64748b;
            font-size: 18px;
        }
        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">潮 向</div>
        <div class="subtitle">建材家居行业日报</div>
        <ul class="report-list" id="report-list">
            <!-- Reports will be dynamically listed here -->
        </ul>
        <div class="footer">
            <p>本日报由 AI 自动生成，仅供参考，不构成投资建议。</p>
        </div>
    </div>
    <script>
        // Known reports - update this list when new reports are added
        const reports = [
            { date: '2026-07-03', label: '今日日报' },
            { date: '2026-07-02', label: '日报' },
        ];
        
        const listEl = document.getElementById('report-list');
        reports.forEach(r => {
            const li = document.createElement('li');
            li.className = 'report-item';
            li.innerHTML = `<a href="daily/${r.date}.html">
                <span class="date">${r.date}</span>
                <span>${r.label}</span>
                <span class="arrow">→</span>
            </a>`;
            listEl.appendChild(li);
        });
    </script>
</body>
</html>
